# Configuración para sitio HTML estático puro
source: ./
output: ./

# Esto le dice a CloudCannon que trate los archivos HTML como páginas editables
collections_config:
  pages:
    path: ''
    output: true
    filter:
      strict_prefix: false
      base: none
      glob: '*.html'

# Forzar el editor visual
_enabled_editors:
  - visual